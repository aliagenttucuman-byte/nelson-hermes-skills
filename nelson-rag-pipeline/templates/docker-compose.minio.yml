# Template: Stack RAG PoC con MinIO (S3 local persistente)
# Uso: copiar junto a backend/ y frontend/ y correr:
#   docker compose -f docker-compose.minio.yml -p <proyecto>-minio up -d
#
# IMPORTANTE: Si se corre en paralelo con un stack FLoCI, usar -p distinto
# o un directorio separado, porque Docker Compose usa el nombre del directorio
# como nombre de proyecto.
#
# IMPORTANTE: Si se expone por Cloudflare, actualizar VITE_API_URL del frontend
# para que apunte a la URL publica del backend (NO localhost).

services:
  minio:
    image: minio/minio:latest
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      - MINIO_ROOT_USER=test
      - MINIO_ROOT_PASSWORD=test123456
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:6333/healthz || python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:6333/healthz')\""]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      - AWS_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test123456
      - AWS_REGION=us-east-1
      - S3_BUCKET=rag-documents
      - QDRANT_HOST=http://qdrant:6333
      - OLLAMA_HOST=http://172.17.0.1:11434
    depends_on:
      - minio
      - qdrant
    volumes:
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "8081:5173"
    environment:
      # IMPORTANTE: Cambiar a la URL publica del backend si se expone por Cloudflare/ngrok
      - VITE_API_URL=http://localhost:8001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  minio-data:
  qdrant-data:
