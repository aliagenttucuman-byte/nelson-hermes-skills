services:
  floci-az:
    image: floci/floci-az:latest
    ports:
      - "4577:4577"
    environment:
      - FLOCI_AZ_STORAGE_MODE=hybrid
    volumes:
      - floci-az-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4577/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6337:6333"
      - "6338:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:6333/healthz || python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:6333/healthz')\""]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8002:8000"
    environment:
      - AZURE_BLOB_ENDPOINT=http://floci-az:4577/devstoreaccount1
      - AZURE_ACCOUNT_NAME=devstoreaccount1
      - AZURE_ACCOUNT_KEY=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMh0==
      - AZURE_CONTAINER=rag-documents
      - QDRANT_HOST=http://qdrant:6333
      - OLLAMA_HOST=http://172.17.0.1:11434
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - OPENCODE_BASE_URL=${OPENCODE_BASE_URL:-https://opencode.ai/zen/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-5.4-nano}
    depends_on:
      - floci-az
      - qdrant
    volumes:
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "8082:5173"
    environment:
      - VITE_API_URL=https://roberts-cure-electoral-wall.trycloudflare.com
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  floci-az-data:
  qdrant-data:
