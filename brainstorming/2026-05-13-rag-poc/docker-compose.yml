services:
  floci:
    image: floci/floci:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
    volumes:
      - floci-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:6333/healthz || python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:6333/healthz')\""]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - AWS_ENDPOINT_URL=http://floci:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test123456
      - AWS_REGION=us-east-1
      - S3_BUCKET=rag-documents
      - QDRANT_HOST=http://qdrant:6333
      - OLLAMA_HOST=http://172.17.0.1:11434
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - OPENCODE_BASE_URL=${OPENCODE_BASE_URL:-https://opencode.ai/zen/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-5.4-nano}
    depends_on:
      - floci
      - qdrant
    volumes:
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "8080:5173"
    environment:
      - VITE_API_URL=https://ham-brian-growth-gnome.trycloudflare.com
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  floci-data:
  qdrant-data:
