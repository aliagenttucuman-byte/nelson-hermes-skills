# ─────────────────────────────────────────────────────────────
# COMANDOS ÚTILES POST-DEPLOY
# ─────────────────────────────────────────────────────────────
#
# 1. Iniciar sesión WhatsApp:
#    curl -X POST http://localhost:3000/api/sessions \
#      -H "Content-Type: application/json" \
#      -H "X-Api-Key: changeme-in-production" \
#      -d '{"name": "default"}'
#
# 2. Obtener QR para escanear:
#    curl http://localhost:3000/api/default/auth/qr.png \
#      -H "X-Api-Key: changeme-in-production" \
#      --output qr.png && open qr.png
#
#    O abrir en navegador:
#    http://localhost:3000/api/default/auth/qr.png
#    (con header X-Api-Key configurado o deshabilitando auth en dev)
#
# 3. Verificar estado:
#    curl http://localhost:3000/api/sessions \
#      -H "X-Api-Key: changeme-in-production"
#
# 4. Enviar mensaje de prueba:
#    curl -X POST http://localhost:3000/api/sendText \
#      -H "Content-Type: application/json" \
#      -H "X-Api-Key: changeme-in-production" \
#      -d '{
#        "chatId": "5491167890123@c.us",
#        "text": "Hola desde WAHA PoC! 🔋",
#        "session": "default"
#      }'
#
# 5. Ver Swagger UI (documentación interactiva):
#    http://localhost:3000/
